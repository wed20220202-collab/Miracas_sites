<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抽選ルーレット</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       Glass-morphism × Dark Mode Design System
       ============================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #ffffff;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    /* ============================================
       Spring Animations (Real Images)
       ============================================ */

    @keyframes blossomFall {
      0% {
        transform: translateY(-100px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      5% {
        opacity: 1;
      }
      95% {
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) translateX(100px) rotate(720deg);
        opacity: 0;
      }
    }

    @keyframes butterflyWave {
      0% {
        transform: translateY(-50px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      5% {
        opacity: 0.9;
      }
      25% {
        transform: translateY(20vh) translateX(40px) rotate(10deg);
      }
      50% {
        transform: translateY(50vh) translateX(-30px) rotate(-10deg);
        opacity: 1;
      }
      75% {
        transform: translateY(75vh) translateX(35px) rotate(10deg);
      }
      95% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(100vh) translateX(0) rotate(0deg);
        opacity: 0;
      }
    }

    @keyframes wingFlap {
      0%, 100% {
        transform: scaleX(1);
      }
      50% {
        transform: scaleX(0.85);
      }
    }

    .spring-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .spring-particle {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .blossom {
      animation: blossomFall var(--duration) linear var(--delay) infinite;
      filter: drop-shadow(0 2px 4px rgba(255, 192, 203, 0.6));
    }

    .butterfly {
      animation: butterflyWave var(--duration) ease-in-out var(--delay) infinite;
    }

    .butterfly img {
      animation: wingFlap 0.4s ease-in-out infinite;
      filter: drop-shadow(0 2px 6px rgba(255, 182, 217, 0.5));
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ============================================
       Main Layout
       ============================================ */

    .main-container {
      display: flex;
      min-height: 100vh;
      gap: 2rem;
      padding: 2rem;
      max-width: 1600px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .center-content {
      flex: 1;
      display: block;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .right-panel {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ============================================
       Header
       ============================================ */

    .header {
      text-align: center;
      margin-bottom: 2rem;
      width: 100%;
    }

    .header-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .header-title h1 {
      font-size: 2.5rem;
      color: #ffffff;
      text-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .sparkle {
      font-size: 2rem;
      animation: sparkle 2s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }

    .header-subtitle {
      color: #06B6D4;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* ============================================
       Wheels Container
       ============================================ */

    .wheels-container {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .wheel-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wheel-panel {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .wheel-panel:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(6, 182, 212, 0.5);
      box-shadow: 0 12px 40px rgba(6, 182, 212, 0.2);
    }

    canvas {
      border-radius: 1rem;
      display: block;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .wheel-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 1rem;
    }

    /* ============================================
       Control Panel (Right Side)
       ============================================ */

    .control-panel {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      height: fit-content;
    }

    .control-section {
      margin-bottom: 1.5rem;
    }

    .control-section:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      color: #ffffff;
      font-weight: 600;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.75rem;
      color: #ffffff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      resize: vertical;
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    textarea:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.15);
      border-color: #06B6D4;
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.3);
    }

    button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #06B6D4 0%, #0891b2 100%);
      color: #ffffff;
      border: none;
      border-radius: 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
      margin-top: 5px;
    }

    button:hover {
      box-shadow: 0 8px 28px rgba(6, 182, 212, 0.6);
      transform: translateY(-2px);
      margin-top: 5px;
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .prize-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .prize-tag {
      background: rgba(6, 182, 212, 0.2);
      border: 1px solid rgba(6, 182, 212, 0.5);
      color: #06B6D4;
      padding: 0.4rem 0.8rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ============================================
       Management Panel
       ============================================ */

    .management-panel {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-height: 400px;
      overflow-y: auto;
    }

    .management-title {
      color: #06B6D4;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .management-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 250px;
      overflow-y: auto;
    }

    .management-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      font-size: 0.85rem;
    }

    .management-item-text {
      flex: 1;
    }

    .toggle-btn {
      padding: 0.4rem 0.8rem;
      background: rgba(107, 203, 119, 0.3);
      border: 1px solid rgba(107, 203, 119, 0.5);
      color: #6BCB77;
      border-radius: 0.4rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
      width: auto;
      margin-top: 0;
    }

    .toggle-btn:hover {
      background: rgba(107, 203, 119, 0.5);
    }

    .toggle-btn.hidden {
      background: rgba(255, 107, 107, 0.3);
      border-color: rgba(255, 107, 107, 0.5);
      color: #FF6B6B;
    }

    .toggle-btn.hidden:hover {
      background: rgba(255, 107, 107, 0.5);
    }

    /* ============================================
       Modal Popup
       ============================================ */

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal-content {
      backdrop-filter: blur(10px);
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
      border: 2px solid rgba(6, 182, 212, 0.8);
      border-radius: 2rem;
      padding: 3rem;
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(6, 182, 212, 0.4);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .result-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .result-item {
      text-align: center;
    }

    .result-item-label {
      color: #06B6D4;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .result-item-value {
      font-size: 3rem;
      font-weight: 700;
      color: #ffffff;
      word-break: break-word;
      text-shadow: 0 4px 12px rgba(6, 182, 212, 0.5);
    }

    .modal-close-btn {
      padding: 0.75rem 2rem;
      background: rgba(6, 182, 212, 0.3);
      border: 1px solid rgba(6, 182, 212, 0.8);
      color: #06B6D4;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0.75rem;
      transition: all 0.3s ease;
    }

    .modal-close-btn:hover {
      background: rgba(6, 182, 212, 0.5);
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.4);
    }

    /* ============================================
       Responsive Design
       ============================================ */

    @media (max-width: 1024px) {
      .main-container {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .right-panel {
        width: 100%;
        flex-direction: row;
        gap: 1rem;
      }

      .control-panel {
        flex: 1;
        position: static;
      }

      .management-panel {
        flex: 1;
      }

      .wheels-container {
        flex-wrap: wrap;
        gap: 1rem;
      }

      .header-title h1 {
        font-size: 1.8rem;
      }

      .result-item-value {
        font-size: 2rem;
      }
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 0.5rem;
      }

      .right-panel {
        flex-direction: column;
      }

      .control-panel {
        padding: 1rem;
      }

      textarea {
        min-height: 120px;
      }

      .modal-content {
        padding: 2rem;
      }

      .result-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- 🌸 Spring Background with Real Images -->
  <div class="spring-background" id="springBackground"></div>

  <div class="main-container">
    <!-- Center Content -->
    <div class="center-content">
      <!-- Header -->
      <div class="header">
        <div class="header-title">
          <span class="sparkle">✨</span>
          <h1>スペシャルルーレット</h1>
          <span class="sparkle">✨</span>
        </div>
        <p class="header-subtitle">Glass-morphism Design × Firebase</p>
      </div>

      <!-- Wheels -->
      <div class="wheels-container">
        <div class="wheel-wrapper">
          <div class="wheel-panel">
            <canvas id="wheelLeft" width="400" height="400"></canvas>
          </div>
          <p class="wheel-label">番号ルーレット</p>
        </div>

        <div class="wheel-wrapper">
          <div class="wheel-panel">
            <canvas id="wheelRight" width="400" height="400"></canvas>
          </div>
          <p class="wheel-label">景品ルーレット</p>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <!-- Control Panel -->
      <div class="control-panel">
        <div class="control-section">
          <label for="prizeTextarea">景品を設定（1行1つ）</label>
          <textarea
            id="prizeTextarea"
            placeholder="選択肢 1&#10;選択肢 2&#10;選択肢 3&#10;選択肢 4&#10;選択肢 5&#10;選択肢 6"
          >選択肢 1
選択肢 2
選択肢 3
選択肢 4
選択肢 5
選択肢 6</textarea>
          <div class="prize-tags" id="prizeTags"></div>
        </div>
        <div class="control-section">
          <button class="spin-button" id="spinBtn" onclick="spin()">🎡 回す！</button>
        </div>
      </div>

      <!-- Management Panel -->
      <div class="management-panel">
        <div class="management-title">📋 非表示管理</div>
        <div class="management-list" id="managementList">
          <p style="color: rgba(255, 255, 255, 0.5); font-size: 0.85rem;">読み込み中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Popup -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal-content">
      <div class="result-label">🎉 抽選結果 🎉</div>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-item-label">当選番号</div>
          <div class="result-item-value" id="resultNumber">-</div>
        </div>
        <div class="result-item">
          <div class="result-item-label">景品</div>
          <div class="result-item-value" id="resultPrize">-</div>
        </div>
      </div>
      <div style="display: flex; gap: 1rem;">
        <button class="modal-close-btn" onclick="closeModal()" id="closeBtn">閉じる</button>
        <button class="modal-close-btn" style="background: rgba(255, 107, 107, 0.3); border-color: rgba(255, 107, 107, 0.8); color: #FF6B6B;" onclick="hideResult()">👁️ 非表示</button>
      </div>
    </div>
  </div>

  <script type="module">
    /* ============================================
       Firebase Setup (Numbers Only)
       ============================================ */

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCIQhHuF3we247IxmhrO3j-Gmr5RFYf-q4",
      authDomain: "chat-sites.firebaseapp.com",
      databaseURL: "https://chat-sites-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chat-sites",
      storageBucket: "chat-sites.firebasestorage.app",
      messagingSenderId: "36894057874",
      appId: "1:36894057874:web:2ae9634f2b1d1081a90d4b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    /* ============================================
       Glass-morphism × Dark Mode Roulette
       ============================================ */

    const leftCanvas = document.getElementById("wheelLeft");
    const rightCanvas = document.getElementById("wheelRight");
    const leftCtx = leftCanvas.getContext("2d");
    const rightCtx = rightCanvas.getContext("2d");

    let numbers = [];
    let prizes = [];
    let allNumbers = [];
    let allPrizes = [];
    let currentResult = { number: null, prize: null };

    let leftRotation = 0;
    let rightRotation = 0;
    let spinningLeft = false;
    let spinningRight = false;

    // ============================================
    // Firebase から番号を取得
    // ============================================
    onSnapshot(collection(db, "users"), (snap) => {
      allNumbers = snap.docs.map(d => ({
        id: d.id,
        number: d.data().number || "",
        hidden: d.data().hidden || false
      }));
      
      numbers = allNumbers.filter(n => !n.hidden).map(n => n.number);
      if (numbers.length > 0) {
        drawWheel(leftCtx, numbers, leftRotation);
      }
      updateManagementList();
    });

    function drawWheel(ctx, items, rotation) {
      const size = 400;
      const center = size / 2;
      const radius = 190;

      ctx.clearRect(0, 0, size, size);
      if (items.length === 0) return;

      const arc = (2 * Math.PI) / items.length;

      items.forEach((item, i) => {
        const angle = i * arc + rotation;

        const gradient = ctx.createLinearGradient(
          center + Math.cos(angle) * radius,
          center + Math.sin(angle) * radius,
          center + Math.cos(angle + arc) * radius,
          center + Math.sin(angle + arc) * radius
        );
        const hue = i * (360 / items.length);
        gradient.addColorStop(0, `hsl(${hue}, 70%, 55%)`);
        gradient.addColorStop(1, `hsl(${hue}, 70%, 45%)`);

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, angle, angle + arc);
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        
        const midAngle = angle + arc / 2;
        const textX = center + Math.cos(midAngle) * (radius * 0.6);
        const textY = center + Math.sin(midAngle) * (radius * 0.6);
        
        ctx.translate(textX, textY);
        ctx.rotate(midAngle + Math.PI / 2);
        
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.font = "bold 14px 'Space Grotesk', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(item, 0, 1);

        ctx.fillStyle = "#ffffff";
        ctx.fillText(item, 0, -1);
        
        ctx.restore();
      });

      ctx.shadowColor = "rgba(6, 182, 212, 0.5)";
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(center, center, 20, 0, 2 * Math.PI);
      ctx.fillStyle = "#06B6D4";
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.shadowColor = "rgba(6, 182, 212, 0.6)";
      ctx.shadowBlur = 15;
      ctx.fillStyle = "#06B6D4";
      ctx.beginPath();
      ctx.moveTo(center, 30);
      ctx.lineTo(center - 15, 0);
      ctx.lineTo(center + 15, 0);
      ctx.fill();
      ctx.shadowColor = "transparent";
    }

    function spinWheel(ctx, items, isLeft) {
      return new Promise(resolve => {
        let rotation = 0;
        let startTime = Date.now();
        const duration = 5000;
        const totalRotations = 5 + Math.random() * 3;

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function animate() {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = easeInOutCubic(progress);
          
          rotation = eased * totalRotations * Math.PI * 2;

          if (isLeft) {
            leftRotation = rotation;
            drawWheel(leftCtx, items, leftRotation);
          } else {
            rightRotation = rotation;
            drawWheel(rightCtx, items, rightRotation);
          }

          if (elapsed < duration) {
            requestAnimationFrame(animate);
          } else {
            const arc = (2 * Math.PI) / items.length;
            const normalizedRotation = rotation % (2 * Math.PI);
            const pointerAngle = Math.PI / 2;
            const adjustedAngle = (pointerAngle - normalizedRotation + 2 * Math.PI) % (2 * Math.PI);
            
            let index = Math.floor(adjustedAngle / arc);
            
            if (index >= items.length) {
              index = items.length - 1;
            }
            if (index < 0) {
              index = 0;
            }
            
            const result = items[index];
            resolve(result);
          }
        }

        animate();
      });
    }

    function updatePrizesFromTextarea() {
      const textarea = document.getElementById("prizeTextarea");
      const inputPrizes = textarea.value
        .split("\n")
        .map(v => v.trim())
        .filter(v => v);

      allPrizes = inputPrizes.map((name) => {
        const existingPrize = allPrizes.find(p => p.name === name);
        return {
          name: name,
          hidden: existingPrize?.hidden || false
        };
      });

      prizes = allPrizes.filter(p => !p.hidden).map(p => p.name);
      if (prizes.length > 0) {
        drawWheel(rightCtx, prizes, rightRotation);
      }
      updateManagementList();
    }

    function updateManagementList() {
      const list = document.getElementById("managementList");
      
      if (allPrizes.length === 0) {
        list.innerHTML = '<p style="color: rgba(255, 255, 255, 0.5); font-size: 0.85rem;">データなし</p>';
        return;
      }

      list.innerHTML = allPrizes.map((prize, index) => `
        <div class="management-item">
          <span class="management-item-text">${prize.name}</span>
          <button class="toggle-btn ${prize.hidden ? 'hidden' : ''}" onclick="togglePrize(${index})">
            ${prize.hidden ? '表示' : '非表示'}
          </button>
        </div>
      `).join("");
    }

    window.togglePrize = function(index) {
      allPrizes[index].hidden = !allPrizes[index].hidden;
      prizes = allPrizes.filter(p => !p.hidden).map(p => p.name);
      if (prizes.length > 0) {
        drawWheel(rightCtx, prizes, rightRotation);
      }
      updateManagementList();
    };

    window.spin = async function() {
      const spinBtn = document.getElementById("spinBtn");
      
      if (spinBtn.textContent.includes("結果確認")) {
        document.getElementById("resultModal").classList.add("active");
        return;
      }

      if (numbers.length === 0) {
        alert("番号がまだ読み込まれていません");
        return;
      }

      if (prizes.length === 0) {
        alert("景品を入力してください");
        return;
      }

      spinBtn.disabled = true;

      const num = await spinWheel(leftCtx, numbers, true);
      await new Promise(r => setTimeout(r, 500));
      const prize = await spinWheel(rightCtx, prizes, false);

      spinBtn.disabled = false;

      currentResult = { number: num, prize };

      const prizeIndex = allPrizes.findIndex(p => p.name === prize);
      if (prizeIndex !== -1) {
        allPrizes[prizeIndex].hidden = true;
        prizes = allPrizes.filter(p => !p.hidden).map(p => p.name);
        drawWheel(rightCtx, prizes, rightRotation);
      }

      document.getElementById("resultNumber").textContent = num;
      document.getElementById("resultPrize").textContent = prize;
      document.getElementById("resultModal").classList.add("active");
      spinBtn.textContent = "✅ 結果確認";
    };

    window.closeModal = function() {
      document.getElementById("resultModal").classList.remove("active");
      document.getElementById("spinBtn").textContent = "🎡 回す！";
      updateManagementList();
    };

    window.hideResult = function() {
      if (!currentResult.number || !currentResult.prize) return;

      const prizeIndex = allPrizes.findIndex(p => p.name === currentResult.prize);
      if (prizeIndex !== -1) {
        allPrizes[prizeIndex].hidden = true;
        prizes = allPrizes.filter(p => !p.hidden).map(p => p.name);
        drawWheel(rightCtx, prizes, rightRotation);
      }

      closeModal();
    };

    document.getElementById("prizeTextarea").addEventListener("input", updatePrizesFromTextarea);

    updatePrizesFromTextarea();
  </script>

  <script>
    /* ============================================
       Spring Animations with Real Images
       ============================================ */

    function createSpringParticles() {
      const background = document.getElementById("springBackground");
      const particleCount = 50;

      // 蝶の画像URL（透明背景）
      const butterflyUrl = "https://svgsilh.com/svg/2025041.svg";
      
      // 桜の画像URL（透明背景）
      const blossomUrl = "https://freesvg.org/img/009.png";

      for (let i = 0; i < particleCount; i++) {
        const rand = Math.random();
        let type, duration, size;

        if (rand > 0.85) {
          // 蝶（15%）
          type = 'butterfly';
          size = Math.random() * 40 + 30;
          duration = Math.random() * 15 + 25;
        } else {
          // 桜（85%）
          type = 'blossom';
          size = Math.random() * 30 + 15;
          duration = Math.random() * 15 + 20;
        }

        const delay = Math.random() * 10;
        const x = Math.random() * 100;

        const particle = document.createElement('div');
        particle.className = `spring-particle ${type}`;
        particle.style.setProperty('--duration', `${duration}s`);
        particle.style.setProperty('--delay', `${delay}s`);
        particle.style.left = `${x}%`;
        particle.style.top = `-${Math.random() * 50}%`;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;

        if (type === 'butterfly') {
          const img = document.createElement('img');
          img.src = butterflyUrl;
          img.alt = 'butterfly';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          particle.appendChild(img);
        } else {
          const img = document.createElement('img');
          img.src = blossomUrl;
          img.alt = 'cherry blossom';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          particle.appendChild(img);
        }

        background.appendChild(particle);
      }
    }

    document.addEventListener('DOMContentLoaded', createSpringParticles);
  </script>
