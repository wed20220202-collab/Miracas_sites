<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リーダー専用ページ</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
<link rel="icon" href="icons/Tokyo_AIfavicon.png">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<style>

.event-layout{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  position:relative;

}

.calendar-box{
  flex:0.7;
  min-width:350px;
  max-width:420px;
  position: relative;
  z-index: 10;
}

#calendar{
  max-width:400px;
  font-size:0.85em;
  position:relative;
  z-index:9999;
}

.editor-box{
  flex:1;
  min-width:450px;
}

.event-editor{
  display:grid;
  grid-template-columns:minmax(80px,max-content) 1fr;
  gap:8px 12px;
  align-items:center;
}

.event-editor h3{
  grid-column:1 / -1;
  margin-top:15px;
  margin-bottom:5px;
}

.event-editor input,
.event-editor select,
.event-editor textarea{
  padding:4px;
  font-size:13px;
}

textarea{
  resize:vertical;
  width:98%;
}

.date-row{
  display:flex;
  align-items:center;
  gap:5px;
}

.small{
  width:65px;
}

.weekday{
  width:70px;
  background:#f3f3f3;
  text-align:center;
}

.team-row{
  display:flex;
  gap:5px;
}

.team{
  width:75px;
}

.save-btn{
  grid-column:1 / -1;
  margin-top:20px;
  padding:10px;
  font-size:16px;
  cursor:pointer;
  width:99%;
}

.export-btn{
  grid-column:1 / -1;
  padding:10px;
  font-size:16px;
  cursor:pointer;
  background-color: #ffa700;
  width:99%;
}

.export-btn:hover{
  background-color: #d27e18;
}

#loadingOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.loadingBox{
  background:white;
  padding:20px 40px;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
}

#loadingOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.spinner{
  width:60px;
  height:60px;
  border:6px solid #ddd;
  border-top:6px solid #4285f4;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{ transform:rotate(0deg); }
  100%{ transform:rotate(360deg); }
}

.calendar-box{
  flex:0.7;
  min-width:350px;
  max-width:420px;

  position:relative;
  height:fit-content;
}

.page{
  transition:margin-left 0.3s;
}

.page.shift{
  margin-left:90px;   /* サイドバー幅 */
}

.visitor-grid{
  display:grid;
  grid-template-columns:145px 70px 70px;
  gap:6px 10px;
  align-items:center;

  width:100%;
  grid-column:1 / -1;   /* ←これ追加 */
}


.visitor-number{
  width:70px;        /* ←全て同じ幅 */
  height:28px;       /* ←高さも統一 */
  text-align:center;
  padding:4px;
  box-sizing:border-box;
}

.head{
  font-weight:bold;
  text-align:center;
  width:70px;
}

.other-information{
  width:300px;
  padding:4px;
  height:28px;
  box-sizing:border-box;
  text-align:left;
}
</style>
