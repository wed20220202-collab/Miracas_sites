    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <h1>管理者画面</h1>
    <div class="topbar-right">
        <div id="headerClock" class="header-clock"></div>
    <div class="profile">
        <button id="profileBtn" class="profile-btn">👤</button>
        <div id="profileMenu" class="profile-menu">
            <div class="profile-name" id="profileName"></div>
            <hr>
            <button id="logoutBtn" class="logout-btn">ログアウト</button>
        </div>
    </div>
</header>

<nav id="sidebar" class="sidebar open">
    <a href="home.html" title="家">
        <img src="icons/home.png">
    </a>
    <a href="list.html" title="座席表管理">

    </a>
    <a href="chat.html" title="チャット">

<div id="page" class="page shift">

<div class="container">

<h2>システム設定</h2>

<!-- 利用時間設定 -->
<div class="setting-box">
    <h3>利用時間設定</h3>

    開始時間：
    <input type="number" id="startHour" min="0" max="23"> 時
    <br>    終了時間：
    <input type="number" id="endHour" min="0" max="23"> 時

    <button id="saveTimeBtn">保存</button>
</div>

<hr>

<!-- チャット削除 -->
<div class="setting-box">
    <h3>チャット管理</h3>
    <button id="deleteChatBtn" class="danger">
        全チャット削除
    </button>
</div>

<hr>

<!-- ログ表示 -->
<div class="setting-box">
    <h3>ログ確認</h3>
    <div id="logList" class="log-box"></div>
</div>

</div>
</div>

<script>
function toggleMenu(){
    const sidebar=document.getElementById("sidebar");
    const page=document.getElementById("page");
    sidebar.classList.toggle("close");
    page.classList.toggle("shift");
    page.classList.toggle("full");
}
</script>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const deleteBtn = document.getElementById("deleteChatBtn");

deleteBtn.addEventListener("click", async ()=>{

  const confirmDelete =
    confirm("本当に全チャットを削除しますか？");

  if(!confirmDelete) return;

  const querySnapshot =
    await getDocs(collection(db,"chats"));

  const promises = [];

  querySnapshot.forEach(document=>{
    promises.push(deleteDoc(doc(db,"chats",document.id)));
  });

  await Promise.all(promises);

  alert("全チャット削除完了");

});
</script>

<script type="module">
import { db } from "./firebase.js";
import { doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const saveBtn = document.getElementById("saveTimeBtn");
const startInput = document.getElementById("startHour");
const endInput = document.getElementById("endHour");

const docRef = doc(db,"settings","timeConfig");

// 既存値読み込み
window.addEventListener("DOMContentLoaded", async ()=>{
  const snap = await getDoc(docRef);
  if(snap.exists()){
    const data = snap.data();
    startInput.value = data.startHour;
    endInput.value = data.endHour;
  }
});

// 保存
saveBtn.addEventListener("click", async ()=>{
  await setDoc(docRef,{
    startHour: Number(startInput.value),
    endHour: Number(endInput.value)
  });
  alert("保存しました");
});
</script>
<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

async function loadLoginLogs(){

  const logList = document.getElementById("logList");

  const q = query(
    collection(db,"loginLogs"),
    orderBy("timestamp","desc")
  );

  const snapshot = await getDocs(q);

  logList.innerHTML = "";

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "log-item";

    const date = data.timestamp
      ? data.timestamp.toDate().toLocaleString()
      : "取得中";

    div.innerHTML = `
      <strong>日時:</strong> ${date}<br>
      <strong>アクション:</strong> ${data.action || "login"}<br>
      <strong>Email:</strong> ${data.email || "-"}<br>
      <strong>UID:</strong> ${data.uid || "-"}<br>
      <strong>表示名:</strong> ${data.displayName || "-"}<br>
      <strong>IP:</strong> ${data.ipAddress || "-"}<br>
      <strong>タイムゾーン:</strong> ${data.timezone || "-"}<br>
      <strong>画面:</strong> ${data.screenWidth || "-"} × ${data.screenHeight || "-"}<br>
      <strong>UserAgent:</strong><br>
      <small>${data.userAgent || "-"}</small>
      <hr>
    `;

    logList.appendChild(div);

  });

}

loadLoginLogs();
</script>

<script type="module" src="settingGuard.js"></script>
<script type="module" src="layout.js"></script>

</body>
</html>
