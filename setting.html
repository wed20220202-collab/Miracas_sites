<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>管理者設定</title>
<link rel="stylesheet" href="setting.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
<script type="module" src="setting.js"></script>
<link rel="icon" href="icons/Tokyo_AIfavicon.png" type="image/x-icon">
</head>

<body>

<header class="topbar">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <h1>管理者画面</h1>
    <div class="topbar-right">
        <div id="headerClock" class="header-clock"></div>
    <div class="profile">
        <button id="profileBtn" class="profile-btn">👤</button>
        <div id="profileMenu" class="profile-menu">
            <div class="profile-name" id="profileName"></div>
            <hr>
            <button id="logoutBtn" class="logout-btn">ログアウト</button>
        </div>
    </div>
</header>

<nav id="sidebar" class="sidebar open">
    <a href="home.html" title="家">
        <img src="icons/home.png">
    </a>
    <a href="list.html" title="座席表管理">
        <img src="icons/char.png">
    </a>
    <a href="chat.html" title="チャット">
        <img id="chatIcon" src="icons/chat.png">
    </a>
    <a href="manage.html" title="当日名簿">
        <img src="icons/Registrant_list.png">
    </a>

    <a href="arrangement.html" title="配置図">
        <img src="icons/arrangement.png">
    </a>
</nav>

<div id="page" class="page shift">

<div class="container">

<h2>システム設定</h2>

<!-- 利用時間設定 -->
<div class="setting-box">
    <h3>利用時間設定</h3>

    開始時間：
    <input type="number" id="startHour" min="0" max="23"> 時
    <br>    終了時間：
    <input type="number" id="endHour" min="0" max="23"> 時

    <button id="saveTimeBtn">保存</button>
</div>

<hr>

<!-- チャット削除 -->
<div class="admin-button-row">
    <h3>チャット管理</h3>
    <button id="deleteChatBtn" class="danger">
        全チャット削除
    </button>

    <div class="vertical-divider"></div>

    <h3>配置図管理</h3>
    <button id="resetArrangementBtn" class="danger reset">
        配置図リセット
    </button>
</div>

<hr>

<div class="setting-box">
<h3>ページ制御</h3>
<label>
    <input type="checkbox" id="lockList">
        座席表を停止
</label>
<br>
<label>
    <input type="checkbox" id="lockChat">
        チャットを停止
</label>
<br>
<label>
    <input type="checkbox" id="lockManage">
        当日名簿を停止
</label>
<br>
<label>
    <input type="checkbox" id="lockArrangement">
        キャスト配置図を停止
</label>
<br>
<label>
    <input type="checkbox" id="lockCaptain">
        OC記録を停止
</label>
<br>
<button id="saveLockBtn">保存</button>
</div>

<hr>

<div class="setting-box">
  <h3>チャットリアクション設定（最大5枚）</h3>
  <div id="reactionSelector" class="reaction-selector">
    <!-- ここに JS で全絵文字画像が表示される -->
  </div>
  <button id="saveReactionsBtn">保存</button>
</div>

<hr>
<!-- ログ表示 -->
<div class="setting-box">
    <h3>ログ確認</h3>
    <div id="logList" class="log-box"></div>
</div>

<hr>

<h3>出勤メンバー確認表</h3>
<iframe id="sheetFrame"
    src="https://docs.google.com/spreadsheets/d/18eA_soDT5EuqEH5wFAO4Nfjcwe486CvcojvzQgilgB0/edit?usp=sharing"
    style="width:100%; height:800px; border:none;">
</iframe>

</div>
</div>

<script type="module" src="settingGuard.js"></script>
<script type="module" src="layout.js"></script>

</body>
</html>
