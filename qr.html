<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>🎯 抽選参加</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       Glass-morphism × Dark Mode Design System
       ============================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    /* ============================================
       Main Container
       ============================================ */

    .container {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
    }

    /* ============================================
       Card Panel
       ============================================ */

    .card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2rem;
      padding: 3rem 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============================================
       Header
       ============================================ */

    .card-header {
      margin-bottom: 2rem;
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .card-title h1 {
      font-size: 2rem;
      color: #ffffff;
      text-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .sparkle {
      font-size: 1.8rem;
      animation: sparkle 2s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }

    .card-subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* ============================================
       Content Section
       ============================================ */

    .card-content {
      margin-bottom: 2rem;
      text-align: left;
    }

    .label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    /* ============================================
       Input Field
       ============================================ */

    input[type="text"] {
      width: 100%;
      padding: 1rem;
      border-radius: 1rem;
      border: 2px solid rgba(6, 182, 212, 0.3);
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      font-size: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      outline: none;
      transition: all 0.3s ease;
      text-align: center;
      margin-bottom: 1rem;
    }

    input[type="text"]:focus {
      border-color: rgba(6, 182, 212, 0.8);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
    }

    input[type="text"]:disabled {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(6, 182, 212, 0.2);
      color: rgba(255, 255, 255, 0.5);
      cursor: not-allowed;
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    /* ============================================
       Display Box
       ============================================ */

    .number-display {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
      border: 2px solid rgba(6, 182, 212, 0.5);
      border-radius: 1.5rem;
      padding: 2rem;
      margin-bottom: 1.5rem;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .number-display:hover {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.3) 0%, rgba(59, 130, 246, 0.3) 100%);
      border-color: rgba(6, 182, 212, 0.8);
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.2);
    }

    .number-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #06B6D4;
      text-shadow: 0 4px 12px rgba(6, 182, 212, 0.5);
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 1px;
      word-break: break-word;
    }

    .number-placeholder {
      font-size: 1.5rem;
      color: rgba(6, 182, 212, 0.5);
      font-weight: 300;
    }

    /* ============================================
       Button
       ============================================ */

    .button-group {
      display: flex;
      gap: 1rem;
      flex-direction: column;
    }

    button {
      padding: 1rem;
      background: linear-gradient(135deg, #06B6D4 0%, #0891b2 100%);
      color: #ffffff;
      border: none;
      border-radius: 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
    }

    button:hover {
      box-shadow: 0 8px 28px rgba(6, 182, 212, 0.6);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .button-secondary {
      background: rgba(6, 182, 212, 0.2);
      border: 1px solid rgba(6, 182, 212, 0.5);
      color: #06B6D4;
      box-shadow: none;
    }

    .button-secondary:hover {
      background: rgba(6, 182, 212, 0.3);
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    /* ============================================
       Status Message
       ============================================ */

    .status-message {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      display: none;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status-message.show {
      display: block;
    }

    .status-success {
      background: rgba(107, 203, 119, 0.2);
      border: 1px solid rgba(107, 203, 119, 0.5);
      color: #6BCB77;
    }

    .status-info {
      background: rgba(6, 182, 212, 0.2);
      border: 1px solid rgba(6, 182, 212, 0.5);
      color: #06B6D4;
    }

    .status-error {
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid rgba(255, 107, 107, 0.5);
      color: #FF6B6B;
    }

    /* ============================================
       Footer
       ============================================ */

    .card-footer {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
    }

    .footer-text {
      line-height: 1.6;
    }

    /* ============================================
       Loading Spinner
       ============================================ */

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(6, 182, 212, 0.3);
      border-top-color: #06B6D4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================
       Responsive Design
       ============================================ */

    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .card {
        padding: 2rem 1.5rem;
        border-radius: 1.5rem;
      }

      .card-title h1 {
        font-size: 1.5rem;
      }

      .number-value {
        font-size: 2rem;
      }

      .number-display {
        min-height: 80px;
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.5rem 1rem;
      }

      .card-title h1 {
        font-size: 1.3rem;
      }

      .number-value {
        font-size: 1.8rem;
      }

      button {
        font-size: 0.95rem;
        padding: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Header -->
      <div class="card-header">
        <div class="card-title">
          <span class="sparkle">🎯</span>
          <h1>抽選参加</h1>
          <span class="sparkle">🎯</span>
        </div>
        <p class="card-subtitle">あなたの名前を登録</p>
      </div>

      <!-- Content -->
      <div class="card-content">
        <label class="label">あなたの名前（20文字以内）</label>

        <input 
          id="nameInput"
          type="text"
          maxlength="20"
          placeholder="名前を入力"
        >

        <div class="number-display">
          <div id="number" class="number-placeholder">未登録</div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button id="joinBtn" onclick="join()">🎡 参加する</button>
        <button id="copyBtn" class="button-secondary" onclick="copyNumber()" style="display: none;">📋 コピー</button>
      </div>

      <!-- Status Message -->
      <div id="statusMessage" class="status-message"></div>

      <!-- Footer -->
      <div class="card-footer">
        <p class="footer-text">✨抽選に参加して、豪華景品をゲットしよう！✨</p>
      </div>
    </div>
  </div>

  <script type="module">
    /* ============================================
       Firebase Setup
       ============================================ */

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCIQhHuF3we247IxmhrO3j-Gmr5RFYf-q4",
      authDomain: "chat-sites.firebaseapp.com",
      databaseURL: "https://chat-sites-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chat-sites",
      storageBucket: "chat-sites.firebasestorage.app",
      messagingSenderId: "36894057874",
      appId: "1:36894057874:web:2ae9634f2b1d1081a90d4b"
    };

    let app, db;

    try {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    } catch (error) {
      console.error('Firebase initialization error:', error);
    }

    /* ============================================
       Simple Storage System
       ============================================ */

    const StorageManager = {
      set: function(key, value) {
        try {
          if (typeof(Storage) !== "undefined") {
            localStorage.setItem(key, value);
          }
        } catch (e) {
          console.warn('localStorage error:', e);
        }

        try {
          sessionStorage.setItem(key, value);
        } catch (e) {
          console.warn('sessionStorage error:', e);
        }

        try {
          const expirationDate = new Date();
          expirationDate.setDate(expirationDate.getDate() + 365);
          document.cookie = `${key}=${encodeURIComponent(value)}; expires=${expirationDate.toUTCString()}; path=/; SameSite=Lax`;
        } catch (e) {
          console.warn('Cookie error:', e);
        }
      },

      get: function(key) {
        try {
          if (typeof(Storage) !== "undefined") {
            const value = localStorage.getItem(key);
            if (value) return value;
          }
        } catch (e) {
          console.warn('localStorage get error:', e);
        }

        try {
          const value = sessionStorage.getItem(key);
          if (value) return value;
        } catch (e) {
          console.warn('sessionStorage get error:', e);
        }

        try {
          const cookies = document.cookie.split(';');
          for (let cookie of cookies) {
            const [name, val] = cookie.trim().split('=');
            if (name === key && val) {
              return decodeURIComponent(val);
            }
          }
        } catch (e) {
          console.warn('Cookie get error:', e);
        }

        return null;
      }
    };

    /* ============================================
       UID Management
       ============================================ */

    function getUID() {
      let uid = StorageManager.get('uid');

      if (!uid) {
        uid = 'uid_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        StorageManager.set('uid', uid);
        console.log('Generated new UID:', uid);
      }

      return uid;
    }

    /* ============================================
       UI Functions
       ============================================ */

    function showStatus(message, type = 'info') {
      const statusEl = document.getElementById('statusMessage');
      statusEl.textContent = message;
      statusEl.className = `status-message show status-${type}`;

      if (type === 'success') {
        setTimeout(() => {
          statusEl.classList.remove('show');
        }, 3000);
      }
    }

    function updateNumberDisplay(name) {
      const numberEl = document.getElementById('number');
      numberEl.textContent = name;
      numberEl.classList.remove('number-placeholder');
      numberEl.classList.add('number-value');

      // Save to storage
      StorageManager.set('name', name);

      // Show copy button
      document.getElementById('copyBtn').style.display = 'block';
      document.getElementById('joinBtn').style.display = 'none';

      // Lock input
      document.getElementById('nameInput').disabled = true;
    }

    window.copyNumber = function() {
      const name = document.getElementById('number').textContent;
      if (name !== '未登録') {
        navigator.clipboard.writeText(name).then(() => {
          showStatus('✓ 名前をコピーしました！', 'success');
        }).catch(() => {
          showStatus('コピーに失敗しました', 'info');
        });
      }
    };

    /* ============================================
       Join Function
       ============================================ */

    window.join = async function() {
      const joinBtn = document.getElementById('joinBtn');
      const nameInput = document.getElementById('nameInput');
      const name = nameInput.value.trim();

      // Validation
      if (!name) {
        showStatus('名前を入力してください', 'info');
        return;
      }

      if (name.length > 20) {
        showStatus('20文字以内で入力してください', 'info');
        return;
      }

      try {
        if (!db) {
          showStatus('Firebaseが初期化されていません', 'error');
          return;
        }

        joinBtn.disabled = true;
        joinBtn.innerHTML = '<span class="spinner"></span>処理中...';

        const uid = getUID();
        const ref = doc(db, "users", uid);
        const snap = await getDoc(ref);

        // Already registered
        if (snap.exists() && snap.data().name) {
          updateNumberDisplay(snap.data().name);
          showStatus('✓ 既に登録済みです', 'success');
          return;
        }

        // Check for duplicate name
        const all = await getDocs(collection(db, "users"));
        const usedNames = all.docs
          .map(d => {
            const data = d.data();
            return data.name ? data.name.trim() : null;
          })
          .filter(n => n !== null);

        if (usedNames.includes(name)) {
          showStatus('その名前は既に使われています', 'info');
          joinBtn.disabled = false;
          joinBtn.textContent = '🎡 参加する';
          return;
        }

        // Save to Firebase
        await setDoc(ref, {
          name: name,
          created: new Date().toISOString()
        });

        updateNumberDisplay(name);
        showStatus('🎉 登録完了！', 'success');

      } catch (error) {
        console.error('Error in join():', error);
        showStatus('エラーが発生しました。もう一度お試しください。', 'error');
        joinBtn.disabled = false;
        joinBtn.textContent = '🎡 参加する';
      }
    };

    /* ============================================
       Initialize
       ============================================ */

    window.addEventListener('load', async () => {
      try {
        // Try to restore from local storage first
        const cachedName = StorageManager.get('name');
        if (cachedName && cachedName !== '未登録') {
          updateNumberDisplay(cachedName);
          showStatus('✓ キャッシュから名前を復元しました', 'info');
          return;
        }

        // If no cache and Firebase is available, try Firebase
        if (db) {
          const uid = getUID();
          const ref = doc(db, "users", uid);
          const snap = await getDoc(ref);

          if (snap.exists() && snap.data().name) {
            const name = snap.data().name;
            updateNumberDisplay(name);
            document.getElementById('nameInput').value = name;
            showStatus('✓ Firebaseから名前を復元しました', 'info');
          }
        }
      } catch (error) {
        console.error('Initialization error:', error);
      }
    });

    // Also check on visibility change
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        try {
          const cachedName = StorageManager.get('name');
          if (cachedName && cachedName !== '未登録') {
            const numberEl = document.getElementById('number');
            if (numberEl.textContent === '未登録') {
              updateNumberDisplay(cachedName);
              showStatus('✓ 名前を復元しました', 'info');
            }
          }
        } catch (error) {
          console.error('Visibility change error:', error);
        }
      }
    });
  </script>
</body>
</html>
